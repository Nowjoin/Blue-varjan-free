<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Verified</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      text-align: center;
    }

    .top-banner {
      width: 100%;
      height: 150px;
      background: url('https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e') no-repeat center/cover;
    }

    .container {
      padding: 20px;
    }

    .badge {
      width: 80px;
      height: 80px;
      background: #1a73e8;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: -40px auto 20px;
      color: white;
      font-size: 40px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .btn {
      background: #1a73e8;
      color: white;
      padding: 12px 30px;
      border-radius: 25px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    p {
      color: #444;
      font-size: 16px;
      line-height: 1.5;
    }

    .link {
      color: #1a73e8;
      text-decoration: none;
      font-weight: bold;
    }

  </style>
</head>
<body>

<div class="top-banner"></div>

<div class="container">
  <div class="badge">✔</div>

  <h1>Become <br> Meta Verified</h1>

  <button class="btn">Apply</button>

  <p>
    Grow your social presence with Meta Verified – a new subscription
    bundle available for creators and businesses on Instagram and Facebook.
  </p>

  <p>Sign up now for creators</p>

  <p>
    Are you a business? Get more information on <br>
    <a href="#" class="link">Meta support for businesses</a>
  </p>
</div>

</body>
</html>
